<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - The RETRO's VAULT</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Header -->
    <header class="glass-header" style="justify-content: center;">
        <div class="logo">
            <i class="fa-solid fa-fingerprint" style="color: #1a1a1a; font-size: 1.4rem;"></i> 
            <span style="font-weight: 800; letter-spacing: -0.5px; color: #1a1a1a; text-transform: uppercase;">The RETRO's VAULT - Admin</span>
        </div>
    </header>

    <main class="main-container">
        <div class="admin-container">
            <div class="admin-header">
                <h2>Add a New Pin</h2>
                <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Store</a>
            </div>

            <form id="addPinForm">
                <div class="form-group">
                    <label for="pTitle">Product Name</label>
                    <input type="text" id="pTitle" class="form-control" required placeholder="E.g., Vintage Camera Lens">
                </div>

                <div class="form-group">
                    <label for="pDesc">Description</label>
                    <input type="text" id="pDesc" class="form-control" required placeholder="A brief, catchy description.">
                </div>

                <div class="form-group">
                    <label for="pLink">Affiliate URL (Redirect Link)</label>
                    <input type="url" id="pLink" class="form-control" required placeholder="https://amazon.com/...">
                </div>

                <div class="form-group">
                    <label for="pCategory">Category</label>
                    <select id="pCategory" class="form-control" required>
                        <option value="gadgets">Gadgets / Tech</option>
                        <option value="fashion">Fashion / Apparel</option>
                        <option value="home">Home Decor / Aesthetic</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="pImage">Upload Product Image</label>
                    <input type="file" id="pImage" class="form-control" accept="image/png, image/jpeg, image/webp" required>
                    <small style="color:var(--text-secondary); margin-top: 5px; display:block;">
                        (Since there's no backend, this will convert the image to Base64 and save it locally. Max size 2MB)
                    </small>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <i class="fa-solid fa-thumbtack"></i> Pin Product
                </button>
            </form>
        </div>

        <div class="admin-container" style="margin-top: 2rem;">
            <div class="admin-header" style="margin-bottom:1rem;">
                <h2>Manage Existing Pins</h2>
            </div>
            <div id="adminProductList" style="display: flex; flex-direction: column; gap: 1rem; max-height: 400px; overflow-y: auto;">
                <!-- Product list will be injected here -->
            </div>
        </div>

        <div class="toast" id="toast">Pin Added Successfully!</div>
    </main>

    <!-- Admin JS -->
    <script src="admin.js"></script>
</body>
</html>
