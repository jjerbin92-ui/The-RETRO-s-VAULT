<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The RETRO's VAULT</title>
    <meta name="description" content="Discover the best curated products, from gadgets to fashion.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Navigation Header -->
    <header class="glass-header">
        <div class="logo">
            <i class="fa-solid fa-fingerprint" style="color: #1a1a1a; font-size: 1.4rem;"></i>
            <span style="font-weight: 800; letter-spacing: -0.5px; color: #1a1a1a; text-transform: uppercase;">The
                RETRO's VAULT</span>
        </div>

        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="searchInput" placeholder="Search for gadgets, fashion, home decor..."
                autocomplete="off">
        </div>

        <nav class="nav-links">
            <button class="nav-btn category-btn active" data-category="all">For You</button>
            <button class="nav-btn category-btn" data-category="gadgets">Gadgets</button>
            <button class="nav-btn category-btn" data-category="fashion">Fashion</button>
            <button class="nav-btn category-btn" data-category="home">Home Decor</button>
            <button class="nav-btn icon-btn wishlist-btn" id="wishlistToggle" title="View Wishlist">
                <i class="fa-solid fa-bookmark"></i>
                <span class="badge" id="wishlistCount">0</span>
            </button>
            <button class="nav-btn icon-btn" id="adminLoginBtn" title="Admin Access"
                style="font-size: 0.95rem; color: #ccc;"><i class="fa-solid fa-lock"></i></button>
        </nav>

        <!-- Mobile Menu Toggle -->
        <button class="mobile-menu-btn" id="mobileMenuBtn">
            <i class="fa-solid fa-bars"></i>
        </button>
    </header>

    <!-- Main Content -->
    <main class="main-container">

        <!-- Category Filter for Mobile -->
        <div class="mobile-categories" id="mobileCategories">
            <button class="nav-btn category-btn active" data-category="all">For You</button>
            <button class="nav-btn category-btn" data-category="gadgets">Gadgets</button>
            <button class="nav-btn category-btn" data-category="fashion">Fashion</button>
            <button class="nav-btn category-btn" data-category="home">Home Decor</button>
            <button class="nav-btn icon-btn" id="mobileAdminLoginBtn" title="Admin Access"
                style="font-size: 0.95rem; color: #ccc; margin-left: 1rem;"><i class="fa-solid fa-lock"></i></button>
        </div>

        <!-- Admin Panel (Hidden by default) -->
        <div id="adminPanel" class="hidden">
            <div class="admin-container">
                <div class="admin-header">
                    <h2>Add a New Pin</h2>
                    <button id="backToStoreBtn"
                        style="background:none; border:none; color: var(--text-secondary); cursor: pointer; font-size: 1rem; margin-top: 1rem; font-weight: 500;"><i
                            class="fa-solid fa-arrow-left"></i> Back to Store</button>
                </div>

                <form id="addPinForm">
                    <div class="form-group">
                        <label for="pTitle">Product Name</label>
                        <input type="text" id="pTitle" class="form-control" required
                            placeholder="E.g., Vintage Camera Lens">
                    </div>

                    <div class="form-group">
                        <label for="pDesc">Description</label>
                        <input type="text" id="pDesc" class="form-control" required
                            placeholder="A brief, catchy description.">
                    </div>

                    <div class="form-group">
                        <label for="pLink">Affiliate URL (Redirect Link)</label>
                        <input type="url" id="pLink" class="form-control" required placeholder="https://amazon.com/...">
                    </div>

                    <div class="form-group">
                        <label for="pCategory">Category</label>
                        <select id="pCategory" class="form-control" required>
                            <option value="gadgets">Gadgets / Tech</option>
                            <option value="fashion">Fashion / Apparel</option>
                            <option value="home">Home Decor / Aesthetic</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="pImage">Upload Product Image</label>
                        <input type="file" id="pImage" class="form-control" accept="image/png, image/jpeg, image/webp"
                            required>
                        <small style="color:var(--text-secondary); margin-top: 5px; display:block;">
                            (Converts to Base64 locally. Max size 2MB)
                        </small>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">
                        <i class="fa-solid fa-thumbtack"></i> Pin Product
                    </button>
                </form>
            </div>

            <div class="admin-container" style="margin-top: 2rem;">
                <div class="admin-header" style="margin-bottom:1rem;">
                    <h2>Manage Existing Pins</h2>
                </div>
                <div id="adminProductList"
                    style="display: flex; flex-direction: column; gap: 1rem; max-height: 400px; overflow-y: auto;">
                    <!-- Product list will be injected here -->
                </div>
            </div>
        </div>

        <!-- Wishlist Notification Toast -->
        <div class="toast" id="toast">Added to wishlist!</div>

        <!-- Masonry Grid Container -->
        <div class="masonry-grid" id="productGrid">
            <!-- Product cards will be dynamically injected here by app.js -->
        </div>

        <!-- Empty State (No Results) -->
        <div class="empty-state hidden" id="emptyState">
            <i class="fa-regular fa-face-frown-open"></i>
            <h2>No pins found</h2>
            <p>Try searching for something else or browse another category.</p>
        </div>

    </main>

    <!-- App Logic -->
    <script src="app.js"></script>
</body>

</html>
